server {
    listen 80;
    server_name b2b.nysonik.com;

    root /var/www/b2b/frontend/dist;
    index index.html;

    # API — proxy to Node.js backend
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Frontend — React SPA, all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
# Note: after running "sudo certbot --nginx -d b2b.nysonik.com"
# certbot will automatically add the HTTPS (443) block here.
